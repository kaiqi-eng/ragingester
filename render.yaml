services:
  - type: web
    name: ragingester
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm ci --include=dev && npm run build -w @ragingester/web
    startCommand: sh -c "node apps/api/src/server.js & node apps/api/src/scheduler/worker.js"
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        value: https://ragingester.onrender.com
      - key: DEFAULT_TIMEZONE
        value: America/Chicago
      - key: DEV_USER_ID
        value: dev-user-1
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GENIE_RSS_BASE_URL
        value: https://genie-rss-5i00.onrender.com
      - key: GENIE_RSS_API_KEY
        sync: false
      - key: BHARAG_BASE_URL
        value: https://bharag.duckdns.org
      - key: BHARAG_MASTER_API_KEY
        sync: false
      - key: BHARAG_OWNER_BUILDER_ID
        sync: false
      - key: BHARAG_OWNER_NAME
        value: Ragingester RSS Owner
      - key: BHARAG_OWNER_EMAIL
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: RUN_TIMEOUT_MS
        value: 180000
      - key: RUN_MAX_RETRIES
        value: 1
      - key: SCHEDULER_POLL_MS
        value: 15000
      - key: RSS_PREWARM_WINDOW_MS
        value: 120000
