name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Test, Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci --include=dev

      - name: Test
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GENIE_RSS_BASE_URL: ${{ secrets.GENIE_RSS_BASE_URL }}
          GENIE_RSS_API_KEY: ${{ secrets.GENIE_RSS_API_KEY }}
          BHARAG_BASE_URL: ${{ secrets.BHARAG_BASE_URL }}
          BHARAG_MASTER_API_KEY: ${{ secrets.BHARAG_MASTER_API_KEY }}
          RUN_RSS_E2E: ${{ secrets.RUN_RSS_E2E }}
        run: npm run test -w @ragingester/api

      - name: Build Web
        run: npm run build -w @ragingester/web

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
    steps:
      - name: Trigger Render Deploy
        if: ${{ env.RENDER_DEPLOY_HOOK_URL != '' }}
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
